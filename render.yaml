databases:
  - name: safespace-db
    plan: free
    databaseName: safespace
    user: safespace

services:
  - type: web
    name: safespace-ai-service
    env: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TOXICITY_FLAG_THRESHOLD
        value: "0.7"

  - type: web
    name: safespace-backend
    env: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11.8.0 --activate && pnpm install --frozen-lockfile && pnpm --filter backend exec prisma generate && pnpm --filter backend exec prisma migrate deploy && pnpm --filter backend run build
    startCommand: pnpm --filter backend run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safespace-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: "3001"
      # Fill in after the ai-service and frontend are deployed and you know their URLs.
      - key: AI_SERVICE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
