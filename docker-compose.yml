services:
  postgres:
    image: postgres:16-alpine
    container_name: safespace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: safespace
      POSTGRES_PASSWORD: safespace_dev_only
      POSTGRES_DB: safespace
    ports:
      - "5432:5432"
    volumes:
      - safespace_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safespace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  safespace_postgres_data:
