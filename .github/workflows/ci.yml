name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: safespace
          POSTGRES_PASSWORD: safespace_dev_only
          POSTGRES_DB: safespace
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://safespace:safespace_dev_only@localhost:5432/safespace?schema=public
      JWT_ACCESS_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Build
        working-directory: backend
        run: pnpm run build

      - name: Lint
        working-directory: backend
        run: pnpm run lint

      - name: Unit tests
        working-directory: backend
        run: pnpm test

      - name: E2E tests
        working-directory: backend
        run: pnpm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: npx eslint .

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Import sanity check
        working-directory: ai-service
        run: python -c "from app.main import app"
